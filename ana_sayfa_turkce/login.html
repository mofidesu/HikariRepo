<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>HIKARI | Giriş Yap</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#20005f",
                        "primary-fixed-dim": "#ffb598",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#e3bfb1",
                        "secondary-fixed": "#e4e2e1",
                        "surface-container": "#eeeeee",
                        "surface-dim": "#dadada",
                        "on-primary-container": "#531a00",
                        "surface-container-highest": "#e2e2e2",
                        "tertiary": "#6648bf",
                        "inverse-primary": "#ffb598",
                        "surface-variant": "#e2e2e2",
                        "on-background": "#1a1c1c",
                        "error": "#ba1a1a",
                        "outline": "#8f7065",
                        "on-tertiary-fixed-variant": "#4d2da6",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#ffdbce",
                        "inverse-on-surface": "#f1f1f1",
                        "on-primary-fixed": "#370e00",
                        "surface": "#f9f9f9",
                        "surface-container-high": "#e8e8e8",
                        "tertiary-fixed-dim": "#cdbdff",
                        "on-surface": "#1a1c1c",
                        "primary": "#a63c00",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#7e2c00",
                        "on-secondary-container": "#656464",
                        "secondary": "#5f5e5e",
                        "secondary-container": "#e4e2e1",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#a63c00",
                        "surface-container-low": "#f3f3f3",
                        "inverse-surface": "#2f3131",
                        "secondary-fixed-dim": "#c8c6c6",
                        "background": "#f9f9f9",
                        "primary-container": "#ff6000",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#9d80fa",
                        "on-secondary-fixed-variant": "#474747",
                        "on-tertiary-container": "#33008c",
                        "on-secondary-fixed": "#1b1c1c",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#5b4137",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed": "#e8deff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "base": "8px",
                        "gutter": "24px",
                        "margin-desktop": "40px",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-xl": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f9;
            color: #1a1c1c;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .tab-active {
            border-bottom: 2px solid #a63c00;
            color: #a63c00;
            font-weight: 600;
        }
        
        .tab-inactive {
            color: #5f5e5e;
            border-bottom: 2px solid transparent;
        }
        
        .tab-inactive:hover {
            color: #a63c00;
        }
    </style>
</head>

<body class="bg-background text-on-background antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    
    <!-- Background Elements -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-fixed/30 rounded-full blur-3xl z-0 pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary-fixed/30 rounded-full blur-3xl z-0 pointer-events-none"></div>

    <!-- Back to Home -->
    <a href="main.html" class="absolute top-8 left-8 md:top-12 md:left-12 flex items-center gap-2 text-secondary hover:text-primary transition-colors z-20 group">
        <span class="material-symbols-outlined transform group-hover:-translate-x-1 transition-transform">arrow_back</span>
        <span class="font-label-md text-label-md">Ana Sayfaya Dön</span>
    </a>

    <!-- Main Container -->
    <main class="w-full max-w-4xl bg-surface-container-lowest rounded-xl shadow-lg overflow-hidden z-10 flex flex-col md:flex-row min-h-[600px] m-4">
        
        <!-- Image Section -->
        <div class="hidden md:block md:w-1/2 relative bg-surface-container-low">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAkOQbmLa0AF_mhAK8NADejH3amLYpZJvU1NwkL_n8lwTV9qXp7GHz-BQxw0QjRgpHgl32HD6_Ty0wZb7XxN-RGKThqO6sPDiIzwRD5rrE4knJAstKzLSOubBLfXoFITJyIPSDMyALro7ijm1Amz3UgFAZ0iDL1WQafPmkbUMF8Z6pgfsPKBt7rF6utNU-_hZQalUyqzGnkd_tN4sNKQcOLMrBGfhcGWGDjZ1B0YBawUwqnSZSX8qunDoknBCpMfM5A9Ph7gZfw1Rg" alt="Hikari Premium" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent flex flex-col justify-end p-10">
                <h1 class="font-headline-xl text-headline-xl text-white mb-2">HIKARI</h1>
                <p class="font-body-md text-body-md text-white/90">Premium deneyime adım atın. En yeni koleksiyonlar ve özel fırsatlar sizi bekliyor.</p>
            </div>
        </div>

        <!-- Form Section -->
        <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
            
            <div class="mb-8">
                <h2 class="font-headline-lg text-headline-lg text-on-surface mb-2" id="form-title">Hoş Geldiniz</h2>
                <p class="font-body-md text-body-md text-secondary" id="form-subtitle">Lütfen hesabınıza giriş yapın.</p>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-outline-variant mb-8 w-full">
                <button id="tab-login" onclick="switchTab('login')" class="flex-1 pb-3 font-label-md text-label-md tab-active transition-colors">Giriş Yap</button>
                <button id="tab-register" onclick="switchTab('register')" class="flex-1 pb-3 font-label-md text-label-md tab-inactive transition-colors">Kayıt Ol</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="flex flex-col gap-5 transition-all duration-300">
                <div id="login-error" class="hidden text-center text-error bg-error-container/50 border border-error-container py-3 px-4 rounded-lg font-label-md text-label-md"></div>
                <div class="flex flex-col gap-1">
                    <label class="font-label-sm text-label-sm text-on-surface" for="login-email">E-posta Adresi</label>
                    <input id="login-email" type="email" placeholder="ornek@mail.com" required
                        class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/10 bg-surface-container-lowest text-on-surface font-body-md text-body-md outline-none transition-all">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="font-label-sm text-label-sm text-on-surface" for="login-password">Şifre</label>
                    <input id="login-password" type="password" placeholder="••••••••" required
                        class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/10 bg-surface-container-lowest text-on-surface font-body-md text-body-md outline-none transition-all">
                </div>
                <div class="flex justify-between items-center mt-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="rounded text-primary focus:ring-primary border-outline-variant cursor-pointer">
                        <span class="font-body-md text-body-md text-secondary group-hover:text-on-surface transition-colors">Beni Hatırla</span>
                    </label>
                    <a href="#" class="font-label-md text-label-md text-primary hover:underline">Şifremi Unuttum</a>
                </div>
                <button type="submit" class="mt-4 bg-primary text-white font-label-md text-label-md py-3 px-8 rounded-lg w-full hover:bg-primary-container transition-colors shadow-sm flex justify-center items-center gap-2">
                    Giriş Yap
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden flex-col gap-5 transition-all duration-300">
                <div id="register-error" class="hidden text-center text-error bg-error-container/50 border border-error-container py-3 px-4 rounded-lg font-label-md text-label-md"></div>
                <div class="flex gap-4">
                    <div class="flex flex-col gap-1 w-1/2">
                        <label class="font-label-sm text-label-sm text-on-surface" for="reg-firstname">İsim</label>
                        <input id="reg-firstname" type="text" placeholder="Adınız" required
                            class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/10 bg-surface-container-lowest text-on-surface font-body-md text-body-md outline-none transition-all">
                    </div>
                    <div class="flex flex-col gap-1 w-1/2">
                        <label class="font-label-sm text-label-sm text-on-surface" for="reg-lastname">Soyisim</label>
                        <input id="reg-lastname" type="text" placeholder="Soyadınız" required
                            class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/10 bg-surface-container-lowest text-on-surface font-body-md text-body-md outline-none transition-all">
                    </div>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="font-label-sm text-label-sm text-on-surface" for="reg-email">E-posta Adresi</label>
                    <input id="reg-email" type="email" placeholder="ornek@mail.com" required
                        class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/10 bg-surface-container-lowest text-on-surface font-body-md text-body-md outline-none transition-all">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="font-label-sm text-label-sm text-on-surface" for="reg-password">Şifre</label>
                    <input id="reg-password" type="password" placeholder="En az 8 karakter" required minlength="8"
                        class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/10 bg-surface-container-lowest text-on-surface font-body-md text-body-md outline-none transition-all">
                </div>
                <button type="submit" class="mt-4 bg-primary text-white font-label-md text-label-md py-3 px-8 rounded-lg w-full hover:bg-primary-container transition-colors shadow-sm flex justify-center items-center gap-2">
                    Hesap Oluştur
                    <span class="material-symbols-outlined text-sm">person_add</span>
                </button>
                <p class="font-body-md text-body-md text-secondary text-center mt-2 text-sm">
                    Kayıt olarak <a href="#" class="text-primary hover:underline">Hizmet Şartları</a> ve <a href="#" class="text-primary hover:underline">Gizlilik Politikası</a>'nı kabul etmiş olursunuz.
                </p>
            </form>

        </div>
    </main>

    <script>
        // Redirect to main.html if already logged in
        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'main.html';
        }

        function switchTab(tab) {
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');

            if (tab === 'login') {
                loginTab.className = 'flex-1 pb-3 font-label-md text-label-md tab-active transition-colors';
                registerTab.className = 'flex-1 pb-3 font-label-md text-label-md tab-inactive transition-colors';
                loginForm.style.display = 'flex';
                registerForm.style.display = 'none';
                title.innerText = 'Hoş Geldiniz';
                subtitle.innerText = 'Lütfen hesabınıza giriş yapın.';
            } else {
                registerTab.className = 'flex-1 pb-3 font-label-md text-label-md tab-active transition-colors';
                loginTab.className = 'flex-1 pb-3 font-label-md text-label-md tab-inactive transition-colors';
                registerForm.style.display = 'flex';
                loginForm.style.display = 'none';
                title.innerText = 'Aileye Katılın';
                subtitle.innerText = 'HIKARI dünyasına adım atmak için hesap oluşturun.';
            }
        }

        // Initialize users list if not exists
        if (!localStorage.getItem('usersList')) {
            localStorage.setItem('usersList', JSON.stringify([]));
        }

        // Handle Login
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            const usersList = JSON.parse(localStorage.getItem('usersList')) || [];
            
            // Find user
            const user = usersList.find(u => u.email === email && u.password === password);

            if (user) {
                // Login success
                errorDiv.classList.add('hidden');
                
                const userData = {
                    firstName: user.firstName,
                    lastName: user.lastName,
                    email: user.email,
                    phone: user.phone || '',
                    cart: user.cart || [],
                    favorites: user.favorites || []
                };

                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userData', JSON.stringify(userData));
                
                // Redirect to main page
                window.location.href = 'main.html';
            } else {
                // Login failed
                errorDiv.innerText = 'Şifre veya mail hatalı.';
                errorDiv.classList.remove('hidden');
            }
        });

        // Handle Register
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const firstName = document.getElementById('reg-firstname').value;
            const lastName = document.getElementById('reg-lastname').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const errorDiv = document.getElementById('register-error');
            
            const usersList = JSON.parse(localStorage.getItem('usersList')) || [];

            // Check if email already exists
            const userExists = usersList.some(u => u.email === email);

            if (userExists) {
                errorDiv.innerText = 'Bu e-posta adresiyle zaten kayıt olunmuş.';
                errorDiv.classList.remove('hidden');
                return;
            }

            // Create new user
            const newUser = {
                id: Date.now().toString(),
                firstName: firstName,
                lastName: lastName,
                email: email,
                password: password,
                phone: '',
                cart: [],
                favorites: []
            };

            // Save to usersList
            usersList.push(newUser);
            localStorage.setItem('usersList', JSON.stringify(usersList));

            // Log them in immediately
            const userData = {
                firstName: firstName,
                lastName: lastName,
                email: email,
                phone: '',
                cart: [],
                favorites: []
            };

            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('userData', JSON.stringify(userData));
            
            // Redirect to main page
            window.location.href = 'main.html';
        });
    </script>
</body>
</html>
