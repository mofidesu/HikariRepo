<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col">
    <div id="navbar-placeholder"></div>

    <main class="flex-grow">
        <!-- Hero Section -->
        <section id="collection-hero" class="relative h-[60vh] min-h-[400px] flex items-center overflow-hidden">
            <img id="collection-banner" src="" class="absolute inset-0 w-full h-full object-cover" alt="Banner" />
            <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/40 to-transparent"></div>
            <div class="relative w-full max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop text-white">
                <div class="max-w-2xl">
                    <span id="collection-subtitle" class="text-primary font-bold tracking-[0.3em] uppercase mb-4 block"></span>
                    <h1 id="collection-title" class="text-5xl md:text-7xl font-bold mb-6 leading-tight"></h1>
                    <p id="collection-desc" class="text-lg md:text-xl text-white/80 mb-8 leading-relaxed"></p>
                    <div class="flex items-center gap-4">
                        <div id="seller-avatar" class="w-14 h-14 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center font-bold text-xl border border-white/30"></div>
                        <div>
                            <p class="text-sm text-white/60">Küratör</p>
                            <p id="seller-name" class="font-bold text-lg"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Product Grid -->
        <section class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-16">
            <div class="flex justify-between items-center mb-12">
                <h2 class="text-3xl font-bold">Koleksiyon Ürünleri</h2>
                <span id="product-count" class="text-secondary"></span>
            </div>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-8">
                <!-- Products will be injected here -->
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="datas/products.js"></script>
    <script src="datas/reviews.js"></script>
    <script src="datas/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderNavbar('main');
            renderFooter('main');

            const urlParams = new URLSearchParams(window.location.search);
            const collectionId = urlParams.get('id');
            const category = urlParams.get('category');

            if (category) {
                renderCategory(category);
            } else if (collectionId) {
                const data = CollectionsData[collectionId] || CollectionsData['autumn'];
                renderCollection(data);
            } else {
                renderCollection(CollectionsData['autumn']);
            }
        });

        function renderCollection(data) {
            document.title = `HIKARI | ${data.title}`;
            document.getElementById('collection-banner').src = data.heroImage;
            document.getElementById('collection-title').innerText = data.title;
            document.getElementById('collection-subtitle').innerText = data.subtitle;
            document.getElementById('collection-desc').innerText = data.description;
            document.getElementById('seller-name').innerText = data.seller;
            document.getElementById('seller-avatar').innerText = data.sellerLogo;

            const products = productsData.filter(p => data.products.includes(p.image));
            renderProducts(products);
        }

        function renderCategory(categoryName) {
            const displayTitle = categoryName === 'Accessories' ? 'Aksesuar Koleksiyonu' : categoryName;
            document.title = `HIKARI | ${displayTitle}`;
            
            // Set some default hero info for categories
            document.getElementById('collection-banner').src = 'https://lh3.googleusercontent.com/aida-public/AB6AXuBzy3NWVFDFzVFj4bPDocM009pnOGgbHVNBU3GwyKLrvezXDh9p7mC6QG-h5k6hLJgJx470qH2UkYY4eNrGyGUK8YC37kiWtNbjYp8P4PYuJkIVDSHYd5b_qI8e6ump7bvZ93DmXagnF15_1zmnwXwl0RJbhkKpGGCD6yMXjW8nTXJh4D2qY0D1jde0qCxdC6AaiW-fnj7ZtmFUuhBTo6M7BS7Uop0VnCVkpMN-DOb0sojoE28zFVOqzNdWEKTggvCjvjvotI-E3TA';
            document.getElementById('collection-title').innerText = displayTitle;
            document.getElementById('collection-subtitle').innerText = 'Tüm Ürünler';
            document.getElementById('collection-desc').innerText = `${displayTitle} kategorisindeki en yeni ve en şık ürünleri keşfedin.`;
            document.getElementById('seller-name').innerText = 'HIKARI Boutique';
            document.getElementById('seller-avatar').innerText = 'HB';

            let filtered;
            if (categoryName === 'Accessories') {
                const accessoryCats = ['Watches', 'Handbags', 'Wallets', 'Belts', 'Jewellery', 'Earrings', 'Ties', 'Caps', 'Sunglasses', 'Socks'];
                filtered = productsData.filter(p => accessoryCats.includes(p.category));
            } else {
                filtered = productsData.filter(p => p.category === categoryName);
            }
            
            renderProducts(filtered);
        }

        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            document.getElementById('product-count').innerText = `${products.length} Ürün Listeleniyor`;
            createProductCards(grid, products, true);
        }
    </script>
</body>
</html>
