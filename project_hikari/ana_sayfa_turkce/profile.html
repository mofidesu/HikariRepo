        <!-- Profile Forms -->
        <div class="flex-grow flex flex-col gap-8">
            
            <!-- Personal Info Card -->

                    Kişisel Bilgiler

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                            <label class="font-label-sm text-label-sm text-secondary" for="prof-firstname">İsim</label>

                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="font-label-sm text-label-sm text-secondary" for="prof-lastname">Soyisim</label>
                            <input id="prof-lastname" type="text"
                                class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/10 bg-surface-container-lowest text-on-surface font-body-md text-body-md outline-none transition-all">

                                class="w-full px-4 py-3 rounded-DEFAULT border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/10 bg-surface-container-lowest text-on-surface font-body-md text-body-md outline-none transition-all">

                            </div>
                            <div>
                                <div class="text-[10px] opacity-70 uppercase tracking-widest mb-1">SKT</div>
                                <div class="font-label-md text-label-md">12/28</div>
                            </div>
                        </div>
                        <button class="absolute top-4 right-4 text-white/50 hover:text-white opacity-0 group-hover:opacity-100 transition-opacity z-20">

    <script src="datas/components.js"></script>
    <script>
        renderNavbar('profile');
        // No footer needed for profile
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if user is logged in
            if (sessionStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
                return;
            }

            // Load user data
            const userData = JSON.parse(sessionStorage.getItem('userData')) || {};
            const firstName = userData.firstName || '';
            const lastName = userData.lastName || '';
            const email = userData.email || '';
            const phone = userData.phone || '';

            // Update UI elements
            document.getElementById('prof-firstname').value = firstName;
            document.getElementById('prof-lastname').value = lastName;
            document.getElementById('prof-email').value = email;
            document.getElementById('prof-phone').value = phone;

            const fullName = `${firstName} ${lastName}`.trim() || 'Kullanıcı';
            document.getElementById('profile-sidebar-name').innerText = fullName;
            document.getElementById('profile-sidebar-email').innerText = email;
            document.getElementById('card-name').innerText = fullName;

            if (firstName) {
                document.getElementById('profile-initials').innerText = firstName.charAt(0).toUpperCase();
            }

            // Handle Profile Update
            document.getElementById('profile-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const updatedData = {
                    firstName: document.getElementById('prof-firstname').value,
                    lastName: document.getElementById('prof-lastname').value,
                    email: document.getElementById('prof-email').value,
                    phone: document.getElementById('prof-phone').value
                };
                
                // Update local session
                sessionStorage.setItem('userData', JSON.stringify(updatedData));

                // Update usersList database
                const usersList = JSON.parse(localStorage.getItem('usersList')) || [];
                // Since we don't have the current user's ID stored in userData (we didn't add it to keep it simple),
                // we'll update based on the email. If the user changed their email, we need to match the old email.
                // To be safe, we should match the current session's email (userData.email)
                const currentUserData = JSON.parse(sessionStorage.getItem('userData'));
                const originalEmail = email; // email from the initial page load (let's assume it hasn't changed or use the one before update)
                // Wait, it's better to find by the email that was loaded initially
                const userIndex = usersList.findIndex(u => u.email === originalEmail);
                if (userIndex !== -1) {
                    usersList[userIndex].firstName = updatedData.firstName;
                    usersList[userIndex].lastName = updatedData.lastName;
                    usersList[userIndex].email = updatedData.email; // If they changed it
                    usersList[userIndex].phone = updatedData.phone;
                    localStorage.setItem('usersList', JSON.stringify(usersList));
                }
                
                // Show a success message (simple alert for now)
                alert('Profil bilgileriniz güncellendi.');
                
                // Refresh the sidebar and card name
                const newFullName = `${updatedData.firstName} ${updatedData.lastName}`.trim() || 'Kullanıcı';
                document.getElementById('profile-sidebar-name').innerText = newFullName;
                document.getElementById('profile-sidebar-email').innerText = updatedData.email;
                document.getElementById('card-name').innerText = newFullName;
                if(updatedData.firstName) document.getElementById('profile-initials').innerText = updatedData.firstName.charAt(0).toUpperCase();

                // Re-render Navbar dynamically to reflect the name change
                if(typeof renderNavbar === 'function') {
                    renderNavbar('profile');
                }
            });

            // Handle Logout
            document.getElementById('logout-btn').addEventListener('click', () => {
                sessionStorage.removeItem('isLoggedIn');
                sessionStorage.removeItem('userData');
                window.location.href = 'main.html';
            });
        });
    </script>
